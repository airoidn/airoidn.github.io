      <stop offset="0" stop-color="#34495f"/>
      <stop offset="0.5" stop-color="#58768b"/>
      <stop offset="1" stop-color="#263a50"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="10"/></filter>
