<svg viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AIRO device preview</title>
  <desc id="desc">A concept preview of the AIRO portable purifier.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#00E5A0" stop-opacity="0.22"/><stop offset="1" stop-color="#00E5A0" stop-opacity="0"/></radialGradient>
    <linearGradient id="body" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#10243d"/><stop offset="1" stop-color="#06101f"/></linearGradient>
  </defs>
  <rect width="720" height="720" fill="#08111f"/>
  <circle cx="360" cy="360" r="300" fill="url(#halo)">
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="4.8s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="360" cy="574" rx="150" ry="28" fill="#00E5A0" opacity="0.18"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -14;0 0" dur="6s" repeatCount="indefinite"/>
    <rect x="238" y="145" width="244" height="394" rx="52" fill="url(#body)" stroke="#00E5A0" stroke-opacity="0.42" stroke-width="4"/>
    <rect x="258" y="165" width="204" height="112" rx="16" fill="#071424"/>
    <g stroke="#00E5A0" stroke-opacity="0.34" stroke-width="2">
      <path d="M306 166v111M360 166v111M414 166v111M258 221h204"/>
    </g>
    <g stroke="#00E5A0" stroke-opacity="0.72" stroke-width="7" stroke-linecap="round">
      <path d="M278 324h164M278 362h164M278 400h164M278 438h164"/>
    </g>
    <circle cx="360" cy="497" r="17" fill="#00E5A0" opacity="0.9">
      <animate attributeName="r" values="14;20;14" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
