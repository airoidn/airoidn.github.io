  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#9fb7d8"/>
      <stop offset="0.55" stop-color="#d6dfe8"/>
      <stop offset="1" stop-color="#e9d2b0"/>
    </linearGradient>
